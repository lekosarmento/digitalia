# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to use for the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported that are
# not part of the 'script_location' directory
# prepend_sys_path = .

# version path separator; as of Alembic 1.11.0, this defaults to os.pathsep
# version_path_separator = :

# set to 'true' to enable searching for version files recursively
# recursive_version_locations = false

# output encoding
# output_encoding = utf-8

sqlalchemy.url = postgresql+asyncpg://postgres:development_password_secure_123@localhost:5432/digitalia

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(name)s] %(levelname)-5.5s %(message)s
datefmt = %H:%M:%S
