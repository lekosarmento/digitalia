version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: digitalia_postgres
    restart: always
    environment:
      POSTGRES_DB: digitalia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: development_password_secure_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d digitalia"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: digitalia_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.4
    container_name: digitalia_localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - "./backend/scripts/create_s3_buckets.sh:/etc/localstack/init/ready.d/create_s3_buckets.sh"
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls || curl -f http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: digitalia_backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digitalia_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:development_password_secure_123@postgres:5432/digitalia
      - REDIS_URL=redis://redis:6379/0
      - WA_APP_SECRET=digitalia_app_secret_placeholder
      - WA_VERIFY_TOKEN=digitalia_verify_token_default
      - LGPD_ENCRYPTION_KEY=digitalia_secure_key_32bytes_long!
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  celery_worker:
    image: digitalia_backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digitalia_celery_worker
    command: celery -A app.tasks.worker worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:development_password_secure_123@postgres:5432/digitalia
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  celery_beat:
    image: digitalia_backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digitalia_celery_beat
    command: celery -A app.tasks.worker beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:development_password_secure_123@postgres:5432/digitalia
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  redis_data:
  localstack_data:
